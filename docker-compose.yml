services:
  sims-architect:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sims-architect
    ports:
      - "8080:8080"
    volumes:
      - ./public/uploads:/usr/share/nginx/html/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
